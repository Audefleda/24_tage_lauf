name: Migrate Production Database

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    name: Apply migrations to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_PROD_ACCESS_TOKEN }}
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Secret SUPABASE_PROD_ACCESS_TOKEN ist nicht konfiguriert. Siehe PROJ-21 Setup-Anleitung."
            exit 1
          fi

      - name: Setup Supabase CLI
        # Security: Fuer erhoehte Sicherheit SHA-Pinning verwenden statt @v1
        # SHA ermitteln mit: gh api repos/supabase/setup-cli/git/refs/tags/v1
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref aceaotlrychrxcafjoxk
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PROD_ACCESS_TOKEN }}

      - name: Repair migration history (einmalig)
        # Hintergrund: Die 11 Migrationen vor PROJ-21 wurden direkt im Dashboard
        # angewendet und haben Supabase-generierte Timestamps (z.B. 20260317103234).
        # Die lokalen Dateien verwenden nur Datums-Praefixe (20260317).
        # Schritt 1: Alte Remote-Eintraege entfernen
        # Schritt 2: Lokale Baseline-Migrationen als angewendet markieren
        run: |
          # Alte Remote-Eintraege entfernen (no-op falls bereits erledigt)
          supabase migration repair --status reverted \
            20260317103234 20260317130114 20260321130330 20260321133034 \
            20260323104117 20260323110313 20260326114655 20260326144346 \
            20260326150052 20260326203713 20260326213206 || true
          # Alle 11 Basis-Migrationen als angewendet markieren
          supabase migration repair --status applied \
            20260317001 20260317002 \
            20260321001 20260321002 \
            20260322001 20260323001 \
            20260326001 20260326002 20260326003 20260326004 20260326005
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PROD_ACCESS_TOKEN }}

      - name: Apply migrations to Production
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PROD_ACCESS_TOKEN }}
