name: Smoke Tests - Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manuell auslösbar

# Nur ein laufender Smoke-Test pro Branch — ältere Runs abbrechen
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke Tests (Production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel Production Deployment
        run: |
          echo "Warte auf Vercel Production Deployment fuer Commit $GITHUB_SHA ..."
          # Prüfe via Vercel API ob das Deployment für diesen Commit READY ist (max 5 Minuten)
          for i in $(seq 1 20); do
            RESPONSE=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=1")
            DEPLOY_STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state')
            DEPLOY_COMMIT=$(echo "$RESPONSE" | jq -r '.deployments[0].meta.githubCommitSha')

            if [ "$DEPLOY_STATE" = "READY" ] && [ "$DEPLOY_COMMIT" = "$GITHUB_SHA" ]; then
              echo "Deployment READY fuer Commit $GITHUB_SHA nach $((i * 15))s"
              sleep 10
              exit 0
            fi
            echo "Versuch $i/20: state=$DEPLOY_STATE commit=${DEPLOY_COMMIT:0:7} (erwartet: ${GITHUB_SHA:0:7}) — warte 15s ..."
            sleep 15
          done
          echo "::error::Production-Deployment fuer Commit $GITHUB_SHA nicht bereit nach 5 Minuten"
          exit 1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Run smoke tests on Production
        run: npx playwright test tests/smoke.spec.ts --grep "@smoke" --project chromium
        env:
          BASE_URL: https://24-tage-lauf.vercel.app
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 30

      - name: Rollback bei fehlgeschlagenen Smoke Tests
        if: failure()
        run: |
          echo "::warning::Smoke Tests fehlgeschlagen — starte Rollback auf letztes erfolgreiches Deployment"

          # Letztes Production-Deployment ermitteln (das VORHERIGE, nicht das aktuelle)
          DEPLOYMENTS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=5&state=READY")

          # Zweites Deployment = letztes erfolgreiches (erstes ist das aktuelle, das fehlschlug)
          PREVIOUS_URL=$(echo "$DEPLOYMENTS" | jq -r '.deployments[1].url')

          if [ "$PREVIOUS_URL" = "null" ] || [ -z "$PREVIOUS_URL" ]; then
            echo "::error::Kein vorheriges Deployment zum Rollback gefunden"
            exit 1
          fi

          echo "Rollback: Promote $PREVIOUS_URL zu Production"

          # Vorheriges Deployment zu Production promoten (kein Lock wie bei Instant Rollback)
          npx vercel promote "https://$PREVIOUS_URL" --token="$VERCEL_TOKEN" --yes

          echo "::notice::Rollback erfolgreich — Production zeigt jetzt das vorherige Deployment ($PREVIOUS_URL)"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
