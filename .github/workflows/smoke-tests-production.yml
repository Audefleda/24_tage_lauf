name: Smoke Tests - Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manuell auslösbar

# Nur ein laufender Smoke-Test pro Branch — ältere Runs abbrechen
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke Tests (Production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel Production Deployment
        run: |
          echo "Warte auf Vercel Production Deployment fuer Commit $GITHUB_SHA ..."
          # Vercel braucht typischerweise 60-120s fuer ein Production Deployment.
          # Wir pruefen alle 15s ob die Seite erreichbar ist (max 5 Minuten).
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production erreichbar (HTTP $STATUS) nach $((i * 15))s"
              # Zusaetzlich 15s warten, damit alle Serverless Functions warm sind
              sleep 15
              exit 0
            fi
            echo "Versuch $i/20: HTTP $STATUS — warte 15s ..."
            sleep 15
          done
          echo "::error::Production nicht erreichbar nach 5 Minuten"
          exit 1
        env:
          BASE_URL: https://24-tage-lauf.vercel.app

      - name: Run smoke tests on Production
        run: npx playwright test tests/smoke.spec.ts --grep "@smoke" --project chromium
        env:
          BASE_URL: https://24-tage-lauf.vercel.app
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 30
