name: Smoke Tests - Production

# DEAKTIVIERT bis TYPO3 live ist
# Um zu aktivieren: Entferne das 'workflow_dispatch' und reaktiviere 'workflow_run'
on:
  workflow_dispatch:  # Nur manuell auslösbar
  # workflow_run:      # Automatisch nach Migration (DEAKTIVIERT)
  #   workflows: ["Migrate Production Database"]
  #   types:
  #     - completed
  #   branches:
  #     - main

jobs:
  smoke-tests:
    name: Smoke Tests (Production)
    runs-on: ubuntu-latest
    # if-Bedingung entfernt, da Workflow nur noch manuell läuft

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel Production Deployment
        run: sleep 60
        # Alternative: Vercel CLI nutzen oder Deployment API abfragen

      - name: Run smoke tests on Production
        run: npx playwright test --grep "@smoke"
        env:
          BASE_URL: https://24-tage-lauf.vercel.app
        continue-on-error: true
        # continue-on-error: true verhindert dass der Job bei Fehlern abbricht
        # So können wir unten eine Notification senden

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 30

      - name: Notify on failure (optional)
        if: failure()
        run: |
          echo "::warning::Production Smoke Tests fehlgeschlagen! Bitte pruefen."
          # Hier könntest du auch eine Slack/Teams/Email-Notification einbauen
